appId: io.kochlabs.cairn
productName: Cairn
copyright: Copyright © 2026 Dennis Koch

# Output directory for the generated installers / archives. Gitignored.
directories:
  output: dist
  buildResources: build

# What ends up inside the app bundle.
# - out/**: the electron-vite build (main, preload, renderer)
# - package.json: needed for the runtime to resolve the main field
# - LICENSE / NOTICE: redistribution requirements (Apache 2.0, SIL OFL)
files:
  - out/**/*
  - package.json
  - LICENSE
  - NOTICE
  - "!**/.DS_Store"

# better-sqlite3 ships a native .node binding. It must be unpacked from
# the asar archive at runtime so Node's dlopen can find it; otherwise the
# packaged app fails to require the module.
asarUnpack:
  - "**/better_sqlite3.node"

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  # Signed + notarized when CI runs with MAC_CSC_LINK / APPLE_ID env vars
  # present (tag-push builds in .github/workflows/build.yml). For unsigned
  # local `make package` builds these vars are unset and electron-builder
  # skips signing — Gatekeeper warns on first launch in that case.
  #
  # hardenedRuntime is required for notarization. electron-builder ships
  # default entitlements with the V8 entries Electron needs
  # (allow-jit, allow-unsigned-executable-memory,
  # allow-dyld-environment-variables); we don't override them. Since
  # we're distributing via Developer ID (not the Mac App Store) the app
  # is not sandboxed, so no network/file-access entitlements are needed.
  #
  # gatekeeperAssess: false skips the slow local Gatekeeper sanity check
  # during build — notarization is the authoritative validation anyway.
  hardenedRuntime: true
  gatekeeperAssess: false

win:
  target:
    - nsis
    - zip
  # No code-signing cert; SmartScreen will warn on first launch.

linux:
  target:
    - AppImage
    - deb
  category: Network
  maintainer: Dennis Koch <drkoch@gmail.com>
