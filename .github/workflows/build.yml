name: Build

# Builds Cairn installers for macOS, Windows, and Linux.
#
# Triggers:
#   - workflow_dispatch: manual via the Actions UI. Produces unsigned
#     artifacts for inspection / dogfooding. No release published.
#   - push to v* tags: cuts a release. Windows installer is signed via
#     Azure Trusted Signing; macOS and Linux remain unsigned for now.
#
# Required secrets (only used on tag pushes for signing + release):
#   AZURE_CLIENT_ID         — federated identity client (app registration)
#   AZURE_TENANT_ID         — Entra tenant the app lives in
#   AZURE_SUBSCRIPTION_ID   — Azure subscription with the signing account
#
# Azure side: the app registration must have a federated credential whose
# subject matches `repo:denniskoch/cairn:ref:refs/tags/*` (or a more
# specific pattern) so GitHub's OIDC token is accepted.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# id-token: write is required for the OIDC federated login to Azure.
# contents: write is required for the release job to create a Release.
permissions:
  contents: write
  id-token: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
            artifact_glob: |
              dist/*.dmg
              dist/*.zip
          - os: windows-latest
            target: win
            artifact_glob: |
              dist/*.exe
              dist/*.zip
          - os: ubuntu-latest
            target: linux
            artifact_glob: |
              dist/*.AppImage
              dist/*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` is reproducible from package-lock.json. The postinstall
        # script runs electron-rebuild against better-sqlite3 — GitHub
        # runners have python + a C++ toolchain installed by default so
        # this works without extra setup.
        run: npm ci

      - name: Package
        env:
          # Skip macOS code signing entirely. Without this, electron-builder
          # tries to auto-discover a signing identity from the runner's
          # keychain and emits noisy warnings when it doesn't find one.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # GitHub token isn't strictly needed for unsigned builds but
          # electron-builder occasionally probes it for release publishing.
          # Passing the auto-provided token quiets the probe.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package:${{ matrix.target }}

      # ----- Windows code signing (tag pushes only) -----
      # Azure Trusted Signing is Microsoft's managed signing service —
      # cheaper than buying an OV/EV cert and avoids the SmartScreen
      # reputation cliff over time. Signing happens before upload-artifact
      # so the artifact already contains the signed .exe.

      - name: Azure login
        if: matrix.target == 'win' && startsWith(github.ref, 'refs/tags/v')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows binaries
        if: matrix.target == 'win' && startsWith(github.ref, 'refs/tags/v')
        uses: azure/trusted-signing-action@v0.5.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: dennis-koch
          certificate-profile-name: public-trust
          files-folder: ./dist
          files-folder-filter: exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cairn-${{ matrix.target }}
          path: ${{ matrix.artifact_glob }}
          retention-days: 30
          if-no-files-found: error

  # Publish to GitHub Releases (tag pushes only). Downloads all platform
  # artifacts from the build matrix and attaches them to a Release. The
  # prerelease flag is auto-set when the tag contains a hyphen (e.g.,
  # v0.1.0-alpha) — release-tagged versions like v1.0.0 become full
  # releases.
  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/cairn-mac/*
            artifacts/cairn-win/*
            artifacts/cairn-linux/*
