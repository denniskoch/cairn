name: Build

# Builds Cairn installers for macOS, Windows, and Linux.
#
# Triggers:
#   - workflow_dispatch: manual via the Actions UI. Produces unsigned
#     artifacts for inspection / dogfooding. No release published.
#   - push to v* tags: cuts a release. Windows installer is signed via
#     Azure Trusted Signing; macOS and Linux remain unsigned for now.
#
# Required secrets (only used on tag pushes for signing + release):
#   AZURE_CLIENT_ID         — federated identity client (app registration)
#   AZURE_TENANT_ID         — Entra tenant the app lives in
#   AZURE_SUBSCRIPTION_ID   — Azure subscription with the signing account
#
# Azure side: the app registration must have a federated credential whose
# subject matches `repo:denniskoch/cairn:ref:refs/tags/*` (or a more
# specific pattern) so GitHub's OIDC token is accepted.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

# id-token: write is required for the OIDC federated login to Azure.
# contents: write is required for the release job to create a Release.
permissions:
  contents: write
  id-token: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: mac
            artifact_glob: |
              dist/*.dmg
              dist/*.zip
          - os: windows-latest
            target: win
            artifact_glob: |
              dist/*.exe
              dist/*.zip
          - os: ubuntu-latest
            target: linux
            artifact_glob: |
              dist/*.AppImage
              dist/*.deb

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # `npm ci` is reproducible from package-lock.json. The postinstall
        # script runs electron-rebuild against better-sqlite3 — GitHub
        # runners have python + a C++ toolchain installed by default so
        # this works without extra setup.
        run: npm ci

      # electron-builder pulls the version from package.json, not from the
      # git tag. On tag pushes we rewrite the package version from the tag
      # name (stripping the leading `v`) so installer filenames and the
      # in-app About string match the release. --no-git-tag-version skips
      # the commit/tag that `npm version` would otherwise try to create.
      # `shell: bash` because Windows runners default to PowerShell where
      # ${VAR#prefix} doesn't expand; Git Bash ships on all GH runners.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version --no-git-tag-version --allow-same-version "$VERSION"

      # ----- Build + sign -----
      #
      # mac / linux / non-tag win: single-pass `npm run package:<target>`.
      #
      # Windows tag builds: two-pass. electron-builder first emits the
      # unpacked app dir (`dist/win-unpacked/`), we sign Cairn.exe inside
      # it via Azure Trusted Signing, then re-invoke electron-builder with
      # `--prepackaged` so the installer is built from the already-signed
      # app dir. Without this the NSIS installer would be signed but the
      # Cairn.exe extracted from it (the binary the user actually runs)
      # would not be, and SmartScreen would warn on every launch.

      - name: Package
        if: '!(matrix.target == ''win'' && startsWith(github.ref, ''refs/tags/v''))'
        env:
          # Skip macOS code signing entirely. Without this, electron-builder
          # tries to auto-discover a signing identity from the runner's
          # keychain and emits noisy warnings when it doesn't find one.
          # The same flag also stops Windows from invoking signtool.exe
          # with no certificate configured.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        # `-- --publish never` forwards `--publish never` to electron-builder
        # so it doesn't try to publish to GitHub Releases on its own. Our
        # `release` job below is the single publisher; without this flag
        # electron-builder sees the git tag + an inferred GITHUB_TOKEN and
        # races our release job, producing duplicate Draft releases.
        run: npm run package:${{ matrix.target }} -- --publish never

      - name: Package (unpacked, for signing)
        if: matrix.target == 'win' && startsWith(github.ref, 'refs/tags/v')
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        # `npm run build` is the electron-vite step that produces
        # `out/main/index.js` — `electron-builder` packages from `out/`
        # so this has to run first. `package:win` normally chains both;
        # here we run them separately so we can insert signing between
        # the unpacked dir and the installer. `--publish never` keeps
        # electron-builder out of GitHub Releases (see comment above).
        run: npm run build && npx electron-builder --win --dir --publish never

      - name: Azure login
        if: matrix.target == 'win' && startsWith(github.ref, 'refs/tags/v')
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign app binary
        if: matrix.target == 'win' && startsWith(github.ref, 'refs/tags/v')
        uses: azure/trusted-signing-action@v0.5.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: dennis-koch
          certificate-profile-name: public-trust
          files-folder: ./dist/win-unpacked
          files-folder-filter: exe
          files-folder-recurse: true

      - name: Package (installer from signed unpacked)
        if: matrix.target == 'win' && startsWith(github.ref, 'refs/tags/v')
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win --prepackaged dist/win-unpacked --publish never

      - name: Sign installer
        if: matrix.target == 'win' && startsWith(github.ref, 'refs/tags/v')
        uses: azure/trusted-signing-action@v0.5.0
        with:
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: dennis-koch
          certificate-profile-name: public-trust
          files-folder: ./dist
          files-folder-filter: exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cairn-${{ matrix.target }}
          path: ${{ matrix.artifact_glob }}
          retention-days: 30
          if-no-files-found: error

  # Publish to GitHub Releases (tag pushes only). Downloads all platform
  # artifacts from the build matrix and attaches them to a Release. The
  # prerelease flag is auto-set when the tag contains a hyphen (e.g.,
  # v0.1.0-alpha) — release-tagged versions like v1.0.0 become full
  # releases.
  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            artifacts/cairn-mac/*
            artifacts/cairn-win/*
            artifacts/cairn-linux/*
